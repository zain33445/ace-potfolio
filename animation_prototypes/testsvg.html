<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Animated Flowchart</title>
    <style>
        /* Base page styling */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            color: #333;
        }

        .scroll-spacer {
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #aaa;
            flex-direction: column;
            gap: 10px;
        }

        /* Container that holds the SVG and Boxes */
        .animation-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 9 / 11; /* Maintains the coordinate system proportions */
            margin: 0 auto;
        }

        /* The SVG Line Canvas */
        .line-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #animated-path {
            fill: none;
            stroke: #2c3e50;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Box Positioning Wrappers */
        .box-wrapper {
            position: absolute;
            width: clamp(100px, 15%, 150px);
            aspect-ratio: 4 / 3;
            /* Keeps the very center of the box locked to the top/left coordinates */
            transform: translate(-50%, -50%); 
            z-index: 2;
        }

        /* Map box centers exactly to the SVG path nodes */
        .wrapper-1 { left: 11.11%; top: 13.63%; } /* Center x=100, y=150 */
        .wrapper-2 { left: 37.77%; top: 34.54%; } /* Center x=340, y=380 */
        .wrapper-3 { left: 62.22%; top: 61.81%; } /* Center x=560, y=680 */
        .wrapper-4 { left: 85.55%; top: 86.36%; } /* Center x=770, y=950 */

        /* The Box Element itself */
        .box {
            width: 100%;
            height: 100%;
            background: #fff;
            border: 3px solid #2c3e50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            
            /* Giving it the slight "hand-drawn" imperfect vibe from your sketch */
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
            box-shadow: 4px 6px 0px rgba(44, 62, 80, 0.15);
            
            /* Initial Hidden State */
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy reveal */
        }

        /* Visible State triggered by JavaScript */
        .box.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Slight unique rotations for organic feel */
        .wrapper-1 .box { transform: translateY(40px) scale(0.9) rotate(-3deg); }
        .wrapper-1 .box.visible { transform: translateY(0) scale(1) rotate(-3deg); }
        
        .wrapper-2 .box { transform: translateY(40px) scale(0.9) rotate(2deg); }
        .wrapper-2 .box.visible { transform: translateY(0) scale(1) rotate(2deg); }
        
        .wrapper-3 .box { transform: translateY(40px) scale(0.9) rotate(-1deg); }
        .wrapper-3 .box.visible { transform: translateY(0) scale(1) rotate(-1deg); }
        
        .wrapper-4 .box { transform: translateY(40px) scale(0.9) rotate(3deg); }
        .wrapper-4 .box.visible { transform: translateY(0) scale(1) rotate(3deg); }

    </style>
</head>
<body>

    <div class="scroll-spacer">
        <span>Scroll Down</span>
        <span>↓</span>
    </div>

    <div class="animation-container">
        
        <!-- Background SVG Line -->
        <svg class="line-canvas" viewBox="0 0 900 1100" preserveAspectRatio="xMidYMid meet">
            <!-- 
                This path is exactly mapped to hit the centers of the HTML boxes.
                M = Move To (Start)
                L = Line To (Straight)
                C = Cubic Bezier Curve (The wavy bits mimicking your drawing)
            -->
            <path id="animated-path" d="
                M 100,150 
                L 100,200 
                C 100,310 210,380 270,380 
                L 410,380 
                C 550,380 400,680 490,680 
                L 630,680 
                C 710,680 770,750 770,900 
                L 770,950
            " />
        </svg>

        <!-- Boxes (Overlapping the path) -->
        <div class="box-wrapper wrapper-1">
            <div class="box">Box 1</div>
        </div>
        <div class="box-wrapper wrapper-2">
            <div class="box">Box 2</div>
        </div>
        <div class="box-wrapper wrapper-3">
            <div class="box">Box 3</div>
        </div>
        <div class="box-wrapper wrapper-4">
            <div class="box">Box 4</div>
        </div>

    </div>

    <div class="scroll-spacer">
        <span>End</span>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // 1. SETUP THE SVG LINE DRAWING
            const path = document.getElementById('animated-path');
            const pathLength = path.getTotalLength();
            
            // Initially hide the line by offsetting the dash by the total length
            path.style.strokeDasharray = pathLength;
            path.style.strokeDashoffset = pathLength;

            // Scroll Event Listener for the Line
            window.addEventListener('scroll', () => {
                const container = document.querySelector('.animation-container');
                const scrollTop = window.scrollY;
                const windowHeight = window.innerHeight;
                const elementTop = container.offsetTop;
                const elementHeight = container.offsetHeight;
                
                // Calculate how far the user has scrolled through the container
                // We offset by 150 pixels so it doesn't instantly draw the moment it enters the screen
                let drawPercentage = (scrollTop + windowHeight - elementTop - 150) / (elementHeight - 150);
                
                // Clamp the value between 0 (not drawn) and 1 (fully drawn)
                drawPercentage = Math.max(0, Math.min(1, drawPercentage));
                
                // Update the SVG stroke offset
                path.style.strokeDashoffset = pathLength * (1 - drawPercentage);
            });


            // 2. SETUP THE BOX REVEAL ANIMATIONS
            const boxes = document.querySelectorAll('.box');
            
            // IntersectionObserver triggers an action when an element enters the screen
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        // Add the 'visible' class when the box scrolls into view
                        entry.target.classList.add('visible');
                    }
                });
            }, {
                // Trigger when 40% of the element is visible in the viewport
                threshold: 0.4
            });

            // Tell the observer to watch all our boxes
            boxes.forEach(box => {
                observer.observe(box);
            });

            // Trigger an initial scroll calculation just in case the user refreshes mid-page
            window.dispatchEvent(new Event('scroll'));
        });
    </script>
</body>
</html>
